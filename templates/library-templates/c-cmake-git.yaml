# ── Global Defaults for External C/CMake ──
root:
  stack: c/cmake
  cmake_min_version: "3.20"
  c_standard: 17
  language: C
  pic: true
  need_libm: false

  dev_packages:
    valgrind: true
    gdb: true
    perl: true
    autoconf: true
    automake: true
    libtool: true

# ── The External Git Payload ──
kind: git
url: https://github.com/{{ github_project | default('contactandyc') }}/{{ name }}.git
shallow: false
build_steps:
  - ./build.sh clean
  - ./build.sh install
find_package: "{{ project_snake }} CONFIG REQUIRED"
link: "{{ project_snake }}::{{ project_snake }}"