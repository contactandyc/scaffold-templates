# ── Global Defaults for Local C/CMake ──
root:
  stack: c/cmake
  cmake_min_version: "3.20"
  c_standard: 17
  language: C
  pic: true
  need_libm: false

  dev_packages:
    valgrind: true
    gdb: true

# ── Local Project Config ──
kind: local
build_steps:
  - ./build.sh clean
  - ./build.sh install
find_package: "{{ project_snake }} CONFIG REQUIRED"
link: "{{ project_snake }}::{{ project_snake }}"
