# ── Global Defaults ──
root:
  stack: c/cmake     # <-- The beautiful shorthand
  cmake_min_version: "3.20"
  c_standard: 23
  language: C
  pic: true
  need_libm: false
  deps:
    kind: library
  tests:
    kind: tests

  # C-Specific Development Tools
  dev_packages:
    valgrind: true
    gdb: true
    perl: true
    autoconf: true
    automake: true
    libtool: true

# ── The Template Payload ──
kind: git
url: https://github.com/{{ github_project }}/{{ name }}.git
shallow: false
build_steps:
  - ./build.sh clean
  - ./build.sh install
find_package: "{{ project_snake }} CONFIG REQUIRED"
link: "{{ project_snake }}::{{ project_snake }}"
