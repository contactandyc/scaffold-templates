kind: git
url: https://github.com/h2o/h2o.git
branch: v2.2.6
shallow: true
depends_on: [ system/OpenSSL, 3rd-party/libuv, system/ZLIB ]
build_steps:
  - cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/usr/local -DWITH_MRUBY=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5
  - cmake --build build -j"$(nproc)"
  - sudo cmake --install build
find_package: null
pkg_config: libh2o
link: h2o
license_spdx: MIT
attribution: "H2O by Kazuho Oku — MIT"