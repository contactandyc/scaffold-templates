kind: git
url: https://github.com/chriskohlhoff/asio.git
branch: asio-1-30-2
shallow: true
build_steps:
  - (cd asio && ./autogen.sh)
  - (cd asio && ./configure --prefix=/usr/local)
  - (cd asio && make -j"$(nproc)")
  - (cd asio && sudo make install)
find_package: null
pkg_config: asio
link: asio
