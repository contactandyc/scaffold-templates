kind: git
url: https://github.com/contactandyc/restinio.git
branch: v.0.7.3-fork
shallow: true
depends_on:
  - custom/fmt
  - custom/expected-lite
  - common/asio
build_steps:
  - cmake -S dev -B dev/build -DCMAKE_INSTALL_PREFIX=/usr/local -DRESTINIO_SAMPLE=OFF -DRESTINIO_TEST=OFF -DRESTINIO_DEP_FMT=system -DRESTINIO_DEP_EXPECTED_LITE=system
  - cmake --build dev/build -j"$(nproc)"
  - sudo cmake --install dev/build
find_package: "restinio REQUIRED"
link: "restinio::restinio"
license_spdx: BSD-3-Clause
attribution: "restinio by Stiffstream — BSD-3-Clause"
