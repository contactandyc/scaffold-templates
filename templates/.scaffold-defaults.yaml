# ── Git Branching Standards ──
branch_prefixes:
  feat: A new feature
  fix: A bug fix
  docs: Documentation only changes
  refactor: A code change that neither fixes a bug nor adds a feature
  test: Adding missing tests or correcting existing tests
  chore: Changes to the build process or auxiliary tools

# ── OSS Engine Routing ──
packages:
  base: true
  stack: true
  changie: false
  site: false

template_packages:
  base:
    - base/**
  stack:
    - stacks/{{ stack }}/base/**
    - stacks/{{ stack }}/{{ stack_type }}/**
  changie:
    - mixins/changie/**
  site:
    - mixins/jekyll-site/**
  resources:
    - resources/**
    - scaffold-repo.yaml
    - aliases.yaml

# ── Dynamic Init Prompts ──
init_prompts:
  - var: stack
    prompt: "Select primary stack:"
    choices_from_dir: "stacks"
    multiselect: true
