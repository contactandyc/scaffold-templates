spdx: |
  {%- for cp in copyrights %}
  SPDX-FileCopyrightText: {{ cp.year_span }} {{ cp.entity }}
  {%- endfor %}
  {%- for c in contacts %}
  SPDX-FileCopyrightText: {{ c.role }}: {{ c.entity }}
  {%- endfor %}
  SPDX-License-Identifier: BSD-3-Clause
license: LICENSE
license_canonical: resources/licenses/BSD-3-Clause.txt
