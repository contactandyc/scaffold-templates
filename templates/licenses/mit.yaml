spdx: |
  {%- for cp in copyrights %}
  SPDX-FileCopyrightText: {{ cp.year_span }} {{ cp.entity }}
  {%- endfor %}
  {%- for c in contacts %}
  SPDX-FileCopyrightText: {{ c.role }}: {{ c.entity }}
  {%- endfor %}
  SPDX-License-Identifier: MIT
license: LICENSE
license_canonical: resources/licenses/MIT.txt
